version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - slimai-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-slimai_user}:${POSTGRES_PASSWORD:-slimai_password}@postgres:5432/${POSTGRES_DB:-slimai}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-auto}
      GEMINI_FALLBACK_MOCK_ON_429: ${GEMINI_FALLBACK_MOCK_ON_429:-false}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      RAG_TOP_K: ${RAG_TOP_K:-4}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-700}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-120}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - slimai-network

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-slimai}
      POSTGRES_USER: ${POSTGRES_USER:-slimai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slimai_password}
    ports:
      - "5432:5432"
    volumes:
      - slimai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - slimai-network

networks:
  slimai-network:
    driver: bridge

volumes:
  slimai-postgres-data:
    driver: local
