name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  frontend-ci:
    name: Frontend build & checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run lint

      - name: Build frontend
        run: npm run build

      # Job default cwd is `frontend/`; Docker context must be repo root paths.
      - name: Verify Docker build (frontend)
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        working-directory: ${{ github.workspace }}
        run: docker build -f frontend/Dockerfile frontend

  backend-ci:
    name: Backend tests & Docker build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

      - name: Verify Docker build (backend)
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        working-directory: ${{ github.workspace }}
        run: docker build -f backend/Dockerfile backend

  structure-check:
    name: Verify repo structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure expected directories exist
        run: |
          test -d frontend
          test -d backend
          test -d data
          test -d docs
          test -d scripts

      - name: Validate docker-compose file
        run: |
          docker compose config


