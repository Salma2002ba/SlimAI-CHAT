name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      # URL is public — prefer Settings → Secrets and variables → Actions → Variables: VITE_API_BASE_URL
      # (Secrets also work: same name.) Example: https://slimai-chat-production.up.railway.app — no trailing slash.
      - name: Require VITE_API_BASE_URL
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::error::Define Actions variable or secret VITE_API_BASE_URL (your FastAPI public URL, no trailing slash)."
            exit 1
          fi

      - name: Build frontend
        env:
          # Must match GitHub Pages URL: /<repository-name>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        id: configure-pages
        uses: actions/configure-pages@v5

      - name: Deploy
        id: deploy-pages
        uses: actions/deploy-pages@v4

